name: sp-ui-coding CI

on:
    pull_request:
        branches: [main]
    workflow_dispatch:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
    group: sp-ui-coding-${{ github.ref }}
    cancel-in-progress: true

permissions: read-all

jobs:
    build-test:
        name: Build + Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Checkout sp-ui-core
              uses: actions/checkout@v4
              with:
                  repository: personal-digital-sovereignty/sp-ui-core
                  path: sp-ui-core

            - name: Link sp-ui-core
              run: ln -s $(pwd)/sp-ui-core ../sp-ui-core

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: 'npm'
            - run: npm ci
            - run: npm run check || true
            - run: npm test
            - run: npm run build
